<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aether & Iron RPG</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Orbitron:wght@400;700;900&family=Cormorant+Garamond:ital,wght@0,400;0,700;1,400&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              fantasyHeader: ['Cinzel', 'serif'],
              fantasyBody: ['Cormorant Garamond', 'serif'],
              scifiHeader: ['Orbitron', 'sans-serif'],
              scifiBody: ['JetBrains Mono', 'monospace'],
            },
            colors: {
              fantasy: {
                bg: '#120f0e',
                panel: '#1c1917',
                accent: '#7e22ce',
                gold: '#b45309',
                text: '#d6d3d1',
              },
              scifi: {
                bg: '#020617',
                panel: '#0f172a',
                accent: '#22d3ee',
                alert: '#f43f5e',
                text: '#f1f5f9',
              }
            },
            animation: {
              'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
              'float': 'float 6s ease-in-out infinite',
              'roll-in': 'roll-in 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards',
              'pop-in': 'pop-in 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards',
              'scanline': 'scanline 8s linear infinite',
              'glimmer': 'glimmer 3s ease-in-out infinite',
            },
            keyframes: {
              float: {
                '0%, 100%': { transform: 'translateY(0)' },
                '50%': { transform: 'translateY(-15px)' },
              },
              'roll-in': {
                '0%': { transform: 'rotate(-360deg) scale(0) translateY(-50px)', opacity: '0' },
                '100%': { transform: 'rotate(0) scale(1) translateY(0)', opacity: '1' }
              },
              'pop-in': {
                '0%': { transform: 'scale(0.8) translateY(10px)', opacity: '0' },
                '100%': { transform: 'scale(1) translateY(0)', opacity: '1' }
              },
              'scanline': {
                '0%': { transform: 'translateY(-100%)' },
                '100%': { transform: 'translateY(100%)' }
              },
              'glimmer': {
                '0%, 100%': { opacity: '0.3', transform: 'scale(1)' },
                '50%': { opacity: '0.6', transform: 'scale(1.05)' }
              }
            }
          }
        }
      }
    </script>
    <style>
      :root {
        --vignette-strength: 40%;
      }
      
      body {
        background: #000;
        margin: 0;
        overflow: hidden;
      }

      /* Game-like vignette */
      .vignette {
        position: fixed;
        inset: 0;
        background: radial-gradient(circle, transparent 40%, rgba(0,0,0,0.8) 120%);
        pointer-events: none;
        z-index: 40;
      }

      /* Fantasy Texture */
      .fantasy-texture {
        background-image: url("https://www.transparenttextures.com/patterns/aged-paper.png");
        mix-blend-mode: multiply;
        opacity: 0.15;
      }

      /* Sci-Fi Scanlines */
      .scifi-scanlines {
        position: fixed;
        inset: 0;
        background: linear-gradient(
          to bottom,
          transparent 50%,
          rgba(6, 182, 212, 0.03) 50%
        );
        background-size: 100% 4px;
        pointer-events: none;
        z-index: 45;
      }

      /* Glassmorphism overrides */
      .glass-fantasy {
        background: rgba(28, 25, 23, 0.85);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(217, 119, 6, 0.1);
      }
      
      .glass-scifi {
        background: rgba(15, 23, 42, 0.8);
        backdrop-filter: blur(16px);
        border: 1px solid rgba(34, 211, 238, 0.1);
      }

      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(150, 150, 150, 0.2);
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: rgba(150, 150, 150, 0.4);
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "@google/genai": "https://esm.sh/@google/genai@^1.34.0",
    "lucide-react": "https://esm.sh/lucide-react@^0.561.0"
  }
}
</script>
</head>
  <body>
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
